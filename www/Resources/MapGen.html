<script>

class Field
{
  constructor (cols, rows, size = 40)
  {
    const c = cols - (cols % 2) + 1;
    this.cols = c * 12 + 11;
    this.rows = rows * 8;
    this.size = size;
    this.triangles = [];
  }

  trianglePoints (triangle)
  {
    const size = this.size;
    const h = Math.sqrt (3) / 2 * size;
    const x = triangle.x * (size / 2) - size / 2;
    const y = triangle.y * h;
    if (triangle.up)
      return `${x + size / 2},${y} ${x},${y + h} ${x + size},${y + h}`;
    else
      return `${x},${y} ${x + size},${y} ${x + size / 2},${y + h}`;
  }
    
  hexPoints (cx, cy, r)
  {
  const h = Math.sqrt(3) * r;
  
  return `${cx + r},${cy}
          ${cx + r/2},${cy + h/2}
          ${cx - r/2},${cy + h/2}
          ${cx - r},${cy}
          ${cx - r/2},${cy - h/2}
          ${cx + r/2},${cy - h/2}`;
  }

  generate ()
  {
    this.triangles = [];
    for (let y = 0; y < this.rows; y++)
      for (let x = 0; x < this.cols; x++)
        this.triangles.push ({x, y, up: (x + y) % 2 === 1});
  }
}

class Renderer
{
  constructor (svg, field, TriBorder = 1, HexBorder = 3)
  {
    this.svg = svg;
    this.field = field;
    this.TriBorder = TriBorder;
    this.HexBorder = HexBorder;
    this.layers = new Map ();
  }

  createLayer (name)
  {
    const g = document.createElementNS ("http://www.w3.org/2000/svg", "g");
    g.setAttribute ("id", name);
    this.svg.appendChild (g);
    this.layers.set (name, g);
    return g;
  }

  toggleLayer (name, visible)
  {
    const layer = this.layers.get (name);
    if (layer) layer.style.display = visible ? "block" : "none";
  }

  renderTriangles ()
  {
    const layer = this.layers.get ("terrain");

    for (const t of this.field.triangles)
    {
      const poly = document.createElementNS ("http://www.w3.org/2000/svg", "polygon");
      poly.setAttribute ("points", this.field.trianglePoints (t));
      poly.setAttribute ("fill", t.up ? "#CCCCCC" : "#DDDDDD"); // "#6aa84f" : "#93c47d"
      poly.setAttribute ("stroke", "#AAA");
      poly.setAttribute ("stroke-width", this.TriBorder);
      layer.appendChild (poly);
    }
  }
  
  renderHexes (Layer, Color)
  {
    const layer = this.layers.get (Layer);
    const size = this.field.size;
    const h = Math.sqrt (3) / 2 * size;

    let hexRadius;
    let rows;
    if (Layer == "S-HexGrid")
    {
      hexRadius = size;
      rows = Math.floor (this.field.rows - 1);
    }
    else if (Layer == "M-HexGrid")
    {
      hexRadius = size * 2;
      rows = Math.floor (this.field.rows / 2 - 1);
    }
    else
    {
      hexRadius = size * 4;
      rows = Math.floor (this.field.rows / 4 - 1);
    }
    const hexHeight = Math.sqrt (3) * hexRadius;

    for (let y = 0; y < rows; y++)
    {
      let cols;
      if (Layer == "S-HexGrid")
        cols = Math.floor (this.field.cols / 6 + 1) - y % 2;
      else if (Layer == "M-HexGrid")
      {
        cols = Math.floor (this.field.cols / 12 + 1) - y % 2;
      }
      else
        cols = Math.floor (this.field.cols / 24 + 1) - y % 2;
        
      for (let x = 0; x < cols; x++)
      {
        let offsetX;
        let cx, cy;
        if (Layer == "S-HexGrid")
        {
          offsetX = (y % 2) * (hexRadius * 1.5);
          cx = x * (hexRadius * 3) + hexRadius + offsetX;
          cy = y * (hexHeight / 2) + hexHeight / 2;
        }
        else if (Layer == "M-HexGrid")
        {
          offsetX = (y % 2) * (hexRadius * 1.5);
          cx = x * (hexRadius * 3) + hexRadius + offsetX + size / 2;
          cy = y * (hexHeight / 2) + hexHeight / 2;
        }
        else
        {
          offsetX = (y % 2) * (hexRadius * 2.5);
          cx = x * (hexRadius * 3) + hexRadius + offsetX + size * 1.5 - (y % 2) * hexRadius;
          cy = y * (hexHeight / 2) + hexHeight / 2;
        }

        const points = this.field.hexPoints (cx, cy, hexRadius);

        const poly = document.createElementNS ("http://www.w3.org/2000/svg", "polygon");
        poly.setAttribute ("points", points);
        poly.setAttribute ("fill", "none");
        poly.setAttribute ("stroke", Color);
        poly.setAttribute ("stroke-width", this.HexBorder);

        layer.appendChild (poly);
      }
    }
  }
    
  render ()
  {
    const size = this.field.size;
    const h = Math.sqrt (3) / 2 * size;
    const width = this.field.cols * (size / 2) - size / 2;
    const height = this.field.rows * h;
    this.svg.innerHTML = "";
    
    // Clip L & R edges...
    const defs = document.createElementNS ("http://www.w3.org/2000/svg", "defs");
    const clip = document.createElementNS ("http://www.w3.org/2000/svg", "clipPath");
    clip.setAttribute ("id", "mapClip");
    const rect = document.createElementNS ("http://www.w3.org/2000/svg", "rect");
    rect.setAttribute ("x", 0);
    rect.setAttribute ("y", 0);
    rect.setAttribute ("width", width);
    rect.setAttribute ("height", height);
    clip.appendChild (rect);
    defs.appendChild (clip);
    this.svg.appendChild (defs);
    this.svg.setAttribute("clip-path", "url(#mapClip)");

    this.svg.setAttribute ("width", width);
    this.svg.setAttribute ("height", height);
    this.createLayer ("terrain");
    this.createLayer ("rivers");
    this.createLayer ("settlements");
    this.createLayer ("S-HexGrid");
    this.createLayer ("M-HexGrid");
    this.createLayer ("L-HexGrid");
    this.renderTriangles ();
    this.renderHexes ("S-HexGrid", "#777");
    this.renderHexes ("M-HexGrid", "#555");
    this.renderHexes ("L-HexGrid", "#333");
  }
}

const svg = document.getElementById ("map");
const field = new Field (11, 4, 25); // Rows of L-Hex (3 + Multiples of 2), Cols of L-Hex (Min 2), TriSize
field.generate ();

const renderer = new Renderer (svg, field, 1, 2); // TriBorder, HexBorder
renderer.render ();



function createLayerButton (name)
{
  const btn = document.createElement ("button");
  btn.textContent = name;
  let visible = true;
  btn.onclick = function toggleLayerButton ()
  {
      visible = !visible;
      renderer.toggleLayer (name, visible);
  };
  ui.appendChild(btn);
}
const layers = ["terrain", "rivers", "settlements", "S-HexGrid", "M-HexGrid", "L-HexGrid"];
for (const name of layers) createLayerButton(name);



function saveSvg ()
{
    const svgClone = svg.cloneNode (true);
    svgClone.setAttribute ("xmlns", "http://www.w3.org/2000/svg");
    const serializer = new XMLSerializer ();
    const svgString = serializer.serializeToString (svgClone);
    const blob = new Blob ([svgString], {type: "image/svg+xml"});
    const url = URL.createObjectURL (blob);
    const a = document.createElement ("a");
    a.href = url;
    a.download = "ttrpg-map.svg";
    a.click ();
    URL.revokeObjectURL (url);
}
const saveBtn = document.createElement ("button");
saveBtn.textContent = "Save SVG";
saveBtn.addEventListener ("click", saveSvg);
ui.appendChild (saveBtn);


function lockMapScroll (event)
{
    event.stopPropagation ();
    return false;
}
const mapContainer = document.getElementById ("mapContainer");
mapContainer.addEventListener ("wheel", lockMapScroll, { passive: false });

</script>
