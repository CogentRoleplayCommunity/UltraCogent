<!--TitleMarker--><h1 style="text-align: center">Welcome to Ultra Cogent's Map Generator!
</h1>
<div class="TranslucentPanel"><div class="PanelArea">

<div id="ui" style="flex:0 0 auto;"></div>

<script>

class Field
{
  constructor(cols, rows, size = 40)
  {
    const c = cols - (cols % 2) + 1;

    if (c < 3)
      this.cols = 3 * 12 + 9;
    else
      this.cols = c * 12 + 9;

    this.rows = rows * 8;
    this.size = size;
    this.triangles = [];
  }

  trianglePoints (triangle)
  {
    const size = this.size;
    const h = Math.sqrt(3) / 2 * size;

    const x = triangle.x * (size / 2) + size / 3;
    const y = triangle.y * h + h / 2;

    if (triangle.up)
      return `${x + size / 2},${y} ${x},${y + h} ${x + size},${y + h}`;
    else
      return `${x},${y} ${x + size},${y} ${x + size / 2},${y + h}`;
  }

  generate ()
  {
    this.triangles = [];

    for (let y = 0; y < this.rows; y++)
      for (let x = 0; x < this.cols; x++)
        this.triangles.push ({x, y, up: (x + y) % 2 === 0});
  }
}

class Renderer
{
  constructor (svg, field, TriBorder = 1, HexBorder = 3)
  {
    this.svg = svg;
    this.field = field;
    this.TriBorder = TriBorder;
    this.HexBorder = HexBorder;
    this.layers = new Map ();
  }

  createLayer (name)
  {
    const g = document.createElementNS ("http://www.w3.org/2000/svg", "g");
    g.setAttribute ("id", name);
    this.svg.appendChild (g);
    this.layers.set (name, g);
    return g;
  }

  toggleLayer (name, visible)
  {
    const layer = this.layers.get (name);
    if (layer) layer.style.display = visible ? "block" : "none";
  }

  renderBackground (width, height)
  {
    const bg = document.createElementNS ("http://www.w3.org/2000/svg", "rect");
    bg.setAttribute ("width", width);
    bg.setAttribute ("height", height);
    bg.setAttribute ("fill", "black");
    this.layers.get ("background").appendChild (bg);
  }

  renderTriangles ()
  {
    const layer = this.layers.get ("terrain");

    for (const t of this.field.triangles)
    {
      const poly = document.createElementNS ("http://www.w3.org/2000/svg", "polygon");

      poly.setAttribute ("points", this.field.trianglePoints (t));

      poly.setAttribute ("fill", t.up ? "#6aa84f" : "#93c47d");

      poly.setAttribute ("stroke", "#AAA");
      poly.setAttribute ("stroke-width", this.TriBorder);

      layer.appendChild (poly);
    }
  }
    
  render ()
  {
    const size = this.field.size;
    const h = Math.sqrt (3) / 2 * size;

    const width = this.field.cols * (size / 2) + size / 2 + size * 0.67;
    const height = this.field.rows * h + h;

    this.svg.setAttribute ("width", width);
    this.svg.setAttribute ("height", height);

    this.svg.innerHTML = "";

    this.createLayer ("background");
    this.createLayer ("terrain");
    this.createLayer ("rivers");
    this.createLayer ("settlements");
    
    this.createLayer ("S-HexGrid");
    this.createLayer ("M-HexGrid");
    this.createLayer ("L-HexGrid");

    this.renderBackground (width, height);
    this.renderTriangles ();
  }
}

const svg = document.getElementById ("map");
const field = new Field (5, 5, 60); // Rows of L-Hex (3 + Multiples of 2), Cols of L-Hex (Min 2), TriSize
field.generate ();

const renderer = new Renderer (svg, field, 1, 3); // TriBorder, HexBorder
renderer.render ();



function createLayerButton (name)
{
  const btn = document.createElement ("button");
  btn.textContent = name;
  let visible = true;
  btn.onclick = function toggleLayerButton ()
  {
      visible = !visible;
      renderer.toggleLayer (name, visible);
  };
  ui.appendChild(btn);
}
const layers = ["background", "terrain", "rivers", "settlements", "S-HexGrid", "M-HexGrid", "L-HexGrid"];
for (const name of layers) createLayerButton(name);



function saveSvg ()
{
    const svgClone = svg.cloneNode (true);
    svgClone.setAttribute ("xmlns", "http://www.w3.org/2000/svg");
    const serializer = new XMLSerializer ();
    const svgString = serializer.serializeToString (svgClone);
    const blob = new Blob ([svgString], {type: "image/svg+xml"});
    const url = URL.createObjectURL (blob);
    const a = document.createElement ("a");
    a.href = url;
    a.download = "ttrpg-map.svg";
    a.click ();
    URL.revokeObjectURL (url);
}
const saveBtn = document.createElement ("button");
saveBtn.textContent = "Save SVG";
saveBtn.addEventListener ("click", saveSvg);
ui.appendChild (saveBtn);


function lockMapScroll (event)
{
    event.stopPropagation ();
    return false;
}
const mapContainer = document.getElementById ("mapContainer");
mapContainer.addEventListener ("wheel", lockMapScroll, { passive: false });

</script>
